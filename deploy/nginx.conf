# aaPanel Nginx config for FortasiMupa
# Copy this to: /www/server/panel/vhost/nginx/fortasi.conf
# Or paste directly in aaPanel → Website → Settings → Nginx Config

server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # === SSL (set via aaPanel SSL panel) ===
    ssl_certificate    /www/server/panel/vhost/cert/your-domain.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # === Document root (aaPanel default) ===
    root /www/wwwroot/fortasi/public;
    index index.php index.html;

    # === Logs ===
    access_log /www/wwwroot/fortasi/storage/logs/nginx-access.log;
    error_log  /www/wwwroot/fortasi/storage/logs/nginx-error.log;

    # === Security headers ===
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # === Static assets (long cache) ===
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /storage/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # === Robots ===
    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }

    # === Favicon ===
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # === Deny hidden files ===
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # === Deny sensitive directories ===
    location ~ ^/(\.env|storage/app|storage/framework|vendor|node_modules|deploy) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # === PHP (Laravel front controller) ===
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi-83.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_param PHP_VALUE "
            upload_max_filesize=10M
            post_max_size=12M
            max_execution_time=300
        ";
    }

    # === Deny large requests ===
    client_max_body_size 12M;
    client_body_timeout 30s;
}
