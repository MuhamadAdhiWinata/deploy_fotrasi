services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: fortasi
      MYSQL_USER: fortasi
      MYSQL_PASSWORD: fortasi
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      target: base
    restart: unless-stopped
    volumes:
      - storage_data:/var/www/storage
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    build:
      context: .
      target: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app

  queue:
    build:
      context: .
      target: base
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --sleep=3
    volumes:
      - storage_data:/var/www/storage
    env_file: .env
    depends_on:
      app:
        condition: service_started

volumes:
  mysql_data:
  storage_data:
